<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Road Fighter</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="ui-overlay">
            <div id="hud">
                <span id="score">SCORE: 0m</span>
                <div id="gas-container">
                    <div id="gas-bar">
                        <div class="gas-segment"></div>
                        <div class="gas-segment"></div>
                        <div class="gas-segment"></div>
                        <div class="gas-segment"></div>
                        <div class="gas-segment"></div>
                    </div>
                </div>
            </div>
            <div id="game-over" class="hidden">
                <h1>GAME OVER</h1>
                <p id="final-score">Score: 0m</p>
                <button id="restart-btn">RESTART</button>
            </div>
        </div>
        <div id="touch-controls">
            <div id="touch-left" class="touch-zone">◄</div>
            <div id="touch-right" class="touch-zone">►</div>
        </div>
    </div>
    <script src="js/game.js?v=12"></script>
</body>
</html>
